services:
  traefik:
    image: traefik:v3.2
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--certificatesresolvers.le.acme.tlschallenge=true"
      - "--certificatesresolvers.le.acme.email=admin@skillsbd.ru"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    mem_limit: 64m

  app:
    image: ghcr.io/vakovalskii/neuraldeep/app:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://skills:${POSTGRES_PASSWORD}@postgres:5432/skillsdb
      - NEXTAUTH_URL=https://neuraldeep.ru
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - AUTH_SECRET=${NEXTAUTH_SECRET}
      - AUTH_TRUST_HOST=true
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - ADMIN_USER_IDS=${ADMIN_USER_IDS:-}
      - NEXT_PUBLIC_ADMIN_IDS=${ADMIN_USER_IDS:-}
      - SKILLS_STORAGE_PATH=/app/data/skills-content
    volumes:
      - skills_content:/app/data/skills-content
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`neuraldeep.ru`)"
      - "traefik.http.routers.app.entrypoints=websecure"
      - "traefik.http.routers.app.tls.certresolver=le"
      - "traefik.http.services.app.loadbalancer.server.port=3000"
      # Redirect skillsbd.ru → neuraldeep.ru
      - "traefik.http.routers.old.rule=Host(`skillsbd.ru`)"
      - "traefik.http.routers.old.entrypoints=websecure"
      - "traefik.http.routers.old.tls.certresolver=le"
      - "traefik.http.routers.old.middlewares=redirect-to-new"
      - "traefik.http.middlewares.redirect-to-new.redirectregex.regex=^https://skillsbd\\.ru/(.*)"
      - "traefik.http.middlewares.redirect-to-new.redirectregex.replacement=https://neuraldeep.ru/$${1}"
      - "traefik.http.middlewares.redirect-to-new.redirectregex.permanent=true"
    mem_limit: 384m

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=skillsdb
      - POSTGRES_USER=skills
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skills -d skillsdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: >
      postgres
        -c shared_buffers=64MB
        -c work_mem=4MB
        -c effective_cache_size=256MB
        -c max_connections=20
    mem_limit: 256m

volumes:
  letsencrypt:
  pgdata:
  skills_content:
