<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Чёрный круг -->
  <circle cx="16" cy="16" r="16" fill="#0a0a0a"/>
  <!-- Синий центр -->
  <circle cx="16" cy="16" r="8" fill="#3b82f6"/>
  <!-- Белые точки — навыки/ноды -->
  <circle cx="16" cy="4" r="2" fill="white"/>
  <circle cx="26" cy="10" r="2" fill="white"/>
  <circle cx="26" cy="22" r="2" fill="white"/>
  <circle cx="16" cy="28" r="2" fill="white"/>
  <circle cx="6" cy="22" r="2" fill="white"/>
  <circle cx="6" cy="10" r="2" fill="white"/>
  <!-- Красные точки — акценты -->
  <circle cx="23" cy="5.5" r="1.5" fill="#ef4444"/>
  <circle cx="9" cy="26.5" r="1.5" fill="#ef4444"/>
  <circle cx="28" cy="16" r="1.5" fill="#ef4444"/>
  <!-- Связи от центра к белым точкам -->
  <line x1="16" y1="8" x2="16" y2="6" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <line x1="22.9" y1="12" x2="24.5" y2="11" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <line x1="22.9" y1="20" x2="24.5" y2="21" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <line x1="16" y1="24" x2="16" y2="26" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <line x1="9.1" y1="20" x2="7.5" y2="21" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <line x1="9.1" y1="12" x2="7.5" y2="11" stroke="white" stroke-width="0.5" opacity="0.3"/>
</svg>
